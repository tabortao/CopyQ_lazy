[Command]
Name=切换简洁模式
MatchCommand="
    copyq:
    var on = config(\"show_simple_items\") === \"true\"
    if (on) {
      menuItem['text'] = '普通模式'
      menuItem['icon'] = '\xf065'
    } else {
      menuItem['text'] = '简洁模式'
      menuItem['icon'] = '\xf066'
    }"
Command="
    copyq:

    popup('按 F8 切换简洁/普通模式','',3000)

    var rows = selectedItems()

    var on = config(\"show_simple_items\") === \"true\"

    // 隐藏/显示标签栏（简洁模式隐藏，普通模式显示）
    config(\"hide_tabs\", !on)

    // 【修改点】始终隐藏工具栏，无论是什么模式
    config(\"hide_toolbar\", true)

    // 开启/关闭单行显示
    config(\"show_simple_items\", !on)

    // 失去焦点时不关闭窗口
    config(\"activate_closes\", on)
    config(\"close_on_unfocus\", on)

    selectItems.apply(this, rows)"
InMenu=true
Icon=\xf066
Shortcut=f8