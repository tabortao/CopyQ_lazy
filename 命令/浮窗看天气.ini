[Commands]
1\Name=浮窗看天气 🌤️
1\Command="
    copyq:
    popup('正在查询天气...', '正在拉取最新数据 ⏳', 1500);
    
    var scriptPath = 'D:/Scripts/weather.py';
    var res = execute('cmd', '/c', 'python', '-X', 'utf8', scriptPath);
    var rawOutput = str(res.stdout).trim();

    if (rawOutput.length > 0) {
        // 【核心优化逻辑】：
        // 1. 去掉内容中重复的“龙岗区”字样，节省空间
        // 2. 将所有换行先变成空格（打扁平），再精准在“当前”和“📅”前加单个换行
        // 3. 使用 CSS 调整行高和字体，让排版更紧凑
        var cleanText = rawOutput.replace(/龙岗区/g, '')
                                 .replace(/[\\r\\n]+/g, ' ')
                                 .replace(/(当前温度|📅)/g, '<br>$1')
                                 .replace(/^<br>/, ''); // 去掉开头可能出现的空行

        var htmlWeather = '<html><div style=\"font-size:12px; line-height:1.2;\">' + 
                          cleanText + 
                          '</div></html>';

        popup('🌤️ 龙岗区天气', htmlWeather, 10000);
    } 
    else {
        var errorInfo = str(res.stderr).trim();
        if (errorInfo.length > 0) popup('报错', errorInfo, 5000);
    }"
1\InMenu=true
1\IsGlobalShortcut=true
1\Icon=⛅
1\GlobalShortcut=shift+f5