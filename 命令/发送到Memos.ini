[Commands]
1\Name=发送到 Memos 📝
1\Command="
    copyq:
    // Memos 的 API 地址
    var url = 'https://your-memos-url/api/v1/memos'
    var tag = '#Inbox/CopyQ'
    
    // 1. 获取选中的文本
    var rows = selectedItems()
    if (rows.length === 0) {
        popup('提示', '请先在 CopyQ 中选中一个条目')
        abort()
    }
    var text = str(read('text/plain', rows[0]))
    if (!text) {
        popup('发送失败', '选中的条目没有纯文本内容')
        abort()
    }
    
    // 【新增】：在文本末尾自动追加换行和专属标签
    text = text.trim() + '\\n\\n' + tag
    
    // 2. 获取 Token (带记忆功能)
    var token = settings('memos_api_token')
    if (!token) {
        token = dialog(
            '.title', '首次配置 Memos',
            '请输入 Memos 的 Access Token\\n(请去 Memos 网页端 -> 设置 -> 个人凭证 中创建并获取):', ''
        )
        if (!token) abort() // 取消则退出
        settings('memos_api_token', token) // 保存到配置文件
    }
    
    // 3. 准备 JSON 请求数据 (写入临时文件以避免特殊字符转义灾难)
    var payload = JSON.stringify({ content: text })
    var tempFile = Dir().tempPath() + '/memos_payload_' + dateString('yyyyMMddhhmmss') + '.json'
    var f = File(tempFile)
    if(!f.open()) {
        popup('错误', '无法创建临时文件')
        abort()
    }
    f.write(payload)
    f.close()
    
    // 4. 弹出发送提示
    popup('发送中...', '正在同步到 Memos 🚀', 1500)
    
    // 5. 使用 curl 发送 POST 请求 (Windows/Mac/Linux 均自带)
    var res = execute(
        'curl', '-s', '-w', '%{http_code}', '-o', '-', 
        '-X', 'POST', 
        '-H', 'Authorization: Bearer ' + token, 
        '-H', 'Content-Type: application/json', 
        '-d', '@' + tempFile, 
        url
    )
    
    // 发送完毕清理临时文件
    f.remove()
    
    // 6. 解析请求结果
    var output = str(res.stdout)
    var httpCode = output.slice(-3)
    var responseBody = output.slice(0, -3)
    
    if (res.exitCode === 0 && httpCode.match(/^20[0-9]$/)) {
        popup('保存成功 🎉', '已发送至 Memos\\n附带标签：' + tag, 2500)
    } else {
        if (httpCode == '401') {
            popup('认证失败 ❌', 'Token 不正确或已失效！\\n系统已自动清空无效 Token，请重新运行命令并输入正确的 Token。', 5000)
            settings('memos_api_token', '') // 清空无效 Token 方便重试
        } else {
            popup('发送失败 ⚠️', 'HTTP 状态码: ' + httpCode + '\\n错误信息: ' + responseBody, 5000)
        }
    }"
1\InMenu=true
1\Icon=📝
1\Shortcut=ctrl+shift+m