[Commands]
1\Name=生成网页 Markdown 链接 🔗
1\Command="
    copyq:
    var url = str(clipboard()).trim();
    if (!/^https?:\\/\\//i.test(url)) {
        popup('❌ 错误', '剪贴板内容不是有效的链接');
        abort();
    }

    popup('正在抓取标题...', '正在召唤 Python 魔法 🪄', 1500);

    // 【自定义区】：请确保以下两个路径与你电脑上的实际路径一致
    var WORK_DIR = 'D:/MyData/01_Projects/Code/fetcher';
    var PYTHON_EXE = WORK_DIR + '/.venv/Scripts/python.exe';
    var SCRIPT_PATH = WORK_DIR + '/fetcher.py';
    
    // 执行抓取
    var res = execute('cmd', '/c', PYTHON_EXE, '-X', 'utf8', SCRIPT_PATH, url, '--title-only');
    
    var rawOutput = str(res.stdout).trim() || str(res.stderr).trim();

    if (rawOutput.length > 0) {
        // 只取输出的第一行作为标题（过滤掉耗时统计）
        var title = rawOutput.split(/[\\r\\n]+/)[0].trim();
        
        if (title) {
            var markdownLink = '[' + title + '](' + url + ')';
            
            // 写入历史记录并更新剪贴板
            var clipTab = config('clipboard_tab');
            if (clipTab) tab(clipTab); 
            insert(0, markdownLink);
            copy(markdownLink);
            
            // 自动粘贴到当前窗口
            paste();
            popup('✅ 成功', title, 3000);
        }
    } else {
        popup('❌ 失败', '脚本未返回内容，请检查网络或配置', 5000);
    }"
1\InMenu=true
1\IsGlobalShortcut=true
1\Icon=🔗
1\GlobalShortcut=ctrl+shift+l