[Commands]
1\Name=全文抓取到 Obsidian 📥
1\Command="
    copyq:
    // ==================== ⚙️ 配置区 ====================
    // 1. fetcher 项目路径
    var WORK_DIR = 'D:/MyData/01_Projects/Code/fetcher';
    var PYTHON_EXE = WORK_DIR + '/.venv/Scripts/python.exe';
    var SCRIPT_PATH = WORK_DIR + '/fetcher.py';

    // 2. Markdown 存储位置 (Obsidian 库路径)
    var MD_DIR = 'D:/MyData/03_Resources/MyObsidian/IPARA/03-Resources/Fetcher';
    
    // 3. 图片存储位置 (Obsidian 附件路径)
    var IMG_DIR = MD_DIR + '/images';
    // ===================================================

    var url = str(clipboard()).trim();
    if (!/^https?:\\/\\//i.test(url)) {
        popup('❌ 错误', '剪贴板内容不是有效的链接！');
        abort();
    }

    // 提示：全文下载包含图片处理，耗时较长
    popup('🚀 开始深度抓取', '正在下载全文并转码图片，请稍后...\\n' + url, 4000);

    // 执行命令: python fetcher.py [URL] -o [MD_DIR] -i [IMG_DIR]
    // 使用绝对路径的 Python 解释器，确保环境正确且支持 UTF-8
    var res = execute(
        'cmd', '/c', 
        PYTHON_EXE, '-X', 'utf8', SCRIPT_PATH, 
        url, 
        '-o', MD_DIR, 
        '-i', IMG_DIR
    );

    var rawOutput = str(res.stdout).trim() || str(res.stderr).trim();

    if (rawOutput.length > 0) {
        // 脚本第一行通常是抓取到的文章标题
        var title = rawOutput.split(/[\\r\\n]+/)[0].trim();
        
        // 弹出成功提示
        popup('✅ 抓取保存成功', '标题：' + title + '\\n已存入 Obsidian Fetcher 文件夹', 5000);
        
        // 【可选】如果你希望下载完后同时生成 Markdown 链接到剪贴板，可以取消下面三行的注释
        // var markdownLink = '[' + title + '](' + url + ')';
        // copy(markdownLink);
        // popup('🔗 链接已复制', markdownLink, 2000);

    } else {
        popup('❌ 抓取失败', '脚本未返回任何有效信息，请确认 fetcher 项目配置是否正确', 6000);
    }"
1\InMenu=true
1\IsGlobalShortcut=true
1\Icon=📥
1\GlobalShortcut=ctrl+shift+d