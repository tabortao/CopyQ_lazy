[Commands]
1\Name=粘贴纯文本（去除多余空行）
1\Command="
    copyq:
    var text = str(clipboard())

    if (!text) {
        popup('粘贴失败', '剪贴板中没有文本内容！', 2000)
        abort() 
    }

    // 1. 去除首尾的空白字符和换行
    text = text.trim()
    
    // 2. 移除只包含空格或制表符的“伪空行”，将它们变成纯换行符
    text = text.replace(/^[ \\t]+$/gm, '')
    
    // 3. 将 2个或更多连续的换行替换为 1个换行（彻底去除空行）
    // 【提示】如果你想在段落之间保留 1 个空行，请将下面这行改为：
    // text = text.replace(/(\\r?\\n){3,}/g, '\\n\\n')
    text = text.replace(/(\\r?\\n){2,}/g, '\\n')

    // 更新剪贴板并粘贴（copySelection 用于兼容 Linux 主剪贴板）
    copy(text)
    copySelection(text)
    paste()"
1\InMenu=true
1\IsGlobalShortcut=true
1\HideWindow=true
1\Icon=
1\GlobalShortcut=ctrl+shift+v