[Commands]
1\Name=公众号 AI 润色助手 📝
1\Command="
    copyq:
    // ==================== ⚙️ 配置区 ====================
    var BASE_URL = 'https://api.deepseek.com/chat/completions';
    var MODEL = 'deepseek-chat';
    var API_KEY = 'sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxx';
    var PROMPT = '你是资深文字编辑。请对文本进行润色，使其通顺、自然、精炼，彻底消除生硬的“AI味”。' +
                 '【修改要求】：' + 
                 '1. 表达干练：用词精准，拒绝啰嗦和冗杂的过渡词，使用自然的人类口吻。' +
                 '2. 尊重原排版：保持文段原有的逻辑骨架，不要刻意切碎或过度分段。' +
                 '3. 忠于原意：优化行文逻辑与流畅度，但不篡改核心事实与观点。' +
                 '【输出限制】：直接输出润色后的正文，严禁出现“好的”、“修改如下”等任何废话。';
    // ===================================================

    var rows = selectedItems();
    var text = '';

    if (rows.length > 0) {
        text = str(read('text/plain', rows[0]));
    } else {
        text = str(clipboard());
    }

    if (!text || text.trim() === '') {
        popup('错误', '没有检测到任何文本内容', 2000);
        abort();
    }

    if (API_KEY === 'sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxx') {
        popup('配置缺失', '请先按 F6 编辑该命令，在代码顶部填入你的 API_KEY', 4000);
        abort();
    }

    popup('主编正在润色...', '正在去除 AI 味，优化排版 🪄', 3000);

    var payloadObj = {
        model: MODEL,
        messages: [
            { role: 'system', content: PROMPT },
            { role: 'user', content: text }
        ]
    };
    var payload = JSON.stringify(payloadObj);
    
    var tempFile = Dir().tempPath() + '/ai_polish_' + dateString('yyyyMMddhhmmss') + '.json';
    var f = File(tempFile);
    if (!f.open()) {
        popup('错误', '无法创建临时文件');
        abort();
    }
    f.write(payload);
    f.close();

    var res = execute(
        'curl', '-s', '-w', '%{http_code}', '-o', '-',
        '-X', 'POST',
        '-H', 'Authorization: Bearer ' + API_KEY,
        '-H', 'Content-Type: application/json',
        '-d', '@' + tempFile,
        BASE_URL
    );

    f.remove(); 

    var output = str(res.stdout);
    var httpCode = output.slice(-3);
    var responseBody = output.slice(0, -3);

    // 【修复】：只看 Http 状态码，只要是 200 级别就是成功
    if (httpCode.match(/^20[0-9]$/)) {
        try {
            var json = JSON.parse(responseBody);
            var resultText = json.choices[0].message.content;
            
            if (resultText) {
                var clipTab = config('clipboard_tab');
                if (clipTab) tab(clipTab); 
                
                // 强制插入到第0行，更新剪贴板
                insert(0, resultText);
                select(0);
                copy(resultText);
                copySelection(resultText);
                
                // 气泡预览前30个字
                var preview = resultText.substring(0, 30).replace(/[\\r\\n]+/g, ' ') + '...';
                popup('✨ 润色完成，可直接粘贴！', preview, 5000);
            } else {
                popup('发生异常', 'AI 返回了空白内容', 3000);
            }
        } catch (e) {
            popup('解析失败', '无法解析 AI 返回的数据：' + e, 5000);
        }
    } else {
        popup('请求失败 ⚠️', 'HTTP 状态码: ' + httpCode + '\\n详情: ' + responseBody, 5000);
    }"
1\InMenu=true
1\IsGlobalShortcut=true
1\Icon=✍️
1\GlobalShortcut=ctrl+shift+p